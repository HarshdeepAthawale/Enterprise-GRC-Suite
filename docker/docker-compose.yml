services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: grc_suite
      POSTGRES_USER: grc_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-grc_dev_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grc_user -d grc_suite"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8008:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://grc_user:${DB_PASSWORD:-grc_dev_pass}@postgres:5432/grc_suite
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://grc_user:${DB_PASSWORD:-grc_dev_pass}@postgres:5432/grc_suite
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    command: celery -A src.scheduler.worker worker --loglevel=info --concurrency=4

  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    command: celery -A src.scheduler.worker beat --loglevel=info

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public

volumes:
  postgres_data:
